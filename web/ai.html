<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A DAY COMPANION - AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07060f;
            --surface: #100e1e;
            --surface2: #17142a;
            --border: rgba(139,92,246,0.18);
            --accent: #a78bfa;
            --accent2: #f472b6;
            --glow: rgba(167,139,250,0.25);
            --text: #ede9fe;
            --muted: rgba(237,233,254,0.42);
            --user-bg: linear-gradient(135deg,#6d28d9,#7c3aed);
            --bot-bg: #17142a;
            --in-bg: rgba(255,255,255,0.04);
        }
        body.light {
            --bg: #ede9fe;
            --surface: #fff;
            --surface2: #f5f3ff;
            --border: rgba(109,40,217,0.14);
            --accent: #6d28d9;
            --accent2: #db2777;
            --glow: rgba(109,40,217,0.14);
            --text: #1e1535;
            --muted: rgba(30,21,53,0.42);
            --user-bg: linear-gradient(135deg,#6d28d9,#8b5cf6);
            --bot-bg: #f0ebff;
            --in-bg: rgba(109,40,217,0.05);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:var(--bg);
            font-family:'DM Sans',sans-serif;
            min-height:100vh;
            display:flex;align-items:center;justify-content:center;
            padding:20px;
            transition:background .4s;
        }
        body::before{
            content:'';position:fixed;
            width:600px;height:600px;
            border-radius:50%;
            background:radial-gradient(circle,rgba(109,40,217,.07) 0%,transparent 70%);
            top:-200px;left:-200px;
            pointer-events:none;
            animation:orb 16s ease-in-out infinite;
            z-index:0;
        }
        @keyframes orb{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,50px)}}

        /* Floating Navigation Links */
        .nav-floating {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            gap: 12px;
        }
        .nav-back-btn {
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--accent);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
        }
        .nav-back-btn:hover {
            background: var(--glow);
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        body.light .nav-back-btn {
            background: var(--surface);
            color: var(--accent);
        }

        .app{
            width:100%;max-width:660px;height:800px;
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:26px;
            display:flex;flex-direction:column;
            overflow:hidden;
            position:relative;z-index:1;
            box-shadow:0 40px 80px rgba(0,0,0,.55),0 0 60px var(--glow);
            transition:background .4s,box-shadow .4s;
        }

        /* HEADER */
        .hdr{
            padding:14px 18px;
            display:flex;align-items:center;justify-content:space-between;
            border-bottom:1px solid var(--border);
            background:var(--surface2);
            flex-shrink:0;
        }
        .hdr-l{display:flex;align-items:center;gap:11px}
        .logo{
            width:38px;height:38px;
            background:linear-gradient(135deg,#7c3aed,#db2777);
            border-radius:11px;
            display:flex;align-items:center;justify-content:center;
            flex-shrink:0;
            box-shadow:0 4px 14px rgba(124,58,237,.45);
        }
        .logo svg{width:20px;height:20px;fill:#fff}
        .app-name{
            font-family:'Syne',sans-serif;
            font-weight:800;font-size:.98rem;
            letter-spacing:.08em;text-transform:uppercase;
            color:var(--accent);
        }
        .app-sub{
            font-size:.67rem;color:var(--muted);
            margin-top:2px;font-weight:300;
            display:flex;align-items:center;gap:5px;
        }
        .live-dot{
            width:6px;height:6px;border-radius:50%;
            background:#22c55e;
            box-shadow:0 0 5px #22c55e;
            animation:blink 2s ease-in-out infinite;
        }
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

        .hdr-r{display:flex;gap:5px;align-items:center}

        .status-pill{
            font-size:.63rem;padding:3px 9px;border-radius:20px;
            border:1px solid rgba(34,197,94,.35);
            background:rgba(34,197,94,.08);color:#4ade80;
            display:flex;align-items:center;gap:4px;
            transition:all .3s;
        }
        .status-pill svg{width:9px;height:9px}
        .status-pill.warn{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.08);color:#f87171}
        .status-pill.idle{border-color:var(--border);background:transparent;color:var(--muted)}

        .ibtn{
            width:30px;height:30px;border-radius:8px;
            border:1px solid var(--border);background:transparent;
            color:var(--muted);cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            transition:all .2s;
        }
        .ibtn svg{width:13px;height:13px}
        .ibtn:hover{background:var(--glow);color:var(--accent);border-color:var(--accent)}

        /* MODEL BAR */
        .mbar{
            padding:9px 16px;
            border-bottom:1px solid var(--border);
            background:var(--surface2);
            display:flex;align-items:center;gap:10px;
            flex-shrink:0;
        }
        .mbar-label{font-size:.73rem;color:var(--muted);white-space:nowrap}
        .msel{
            background:var(--in-bg);
            border:1px solid var(--border);
            color:var(--text);
            padding:5px 10px;border-radius:8px;
            font-size:.78rem;font-family:'DM Sans',sans-serif;
            outline:none;cursor:pointer;flex:1;
            transition:border-color .2s;
        }
        .msel:focus{border-color:var(--accent)}
        .msel option{background:#1a1535;color:#ede9fe}

        /* MESSAGES */
        .msgs{
            flex:1;overflow-y:auto;
            padding:18px 16px;
            display:flex;flex-direction:column;gap:14px;
            scroll-behavior:smooth;
        }
        .msgs::-webkit-scrollbar{width:3px}
        .msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        .msg{max-width:82%;animation:pop .28s cubic-bezier(.34,1.56,.64,1)}
        @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
        .msg.u{align-self:flex-end}
        .msg.b{align-self:flex-start}

        .bbl{
            padding:11px 15px;border-radius:16px;
            font-size:.88rem;line-height:1.65;
            color:var(--text);word-break:break-word;
        }
        .msg.u .bbl{
            background:var(--user-bg);color:#fff;
            border-bottom-right-radius:4px;
            box-shadow:0 4px 18px rgba(109,40,217,.3);
        }
        .msg.b .bbl{
            background:var(--bot-bg);
            border:1px solid var(--border);
            border-bottom-left-radius:4px;
        }
        body.light .msg.b .bbl{color:#1e1535}

        .meta{
            font-size:.63rem;color:var(--muted);
            margin-top:4px;padding:0 3px;
            display:flex;justify-content:space-between;align-items:center;
        }
        .msg.u .meta{justify-content:flex-end}
        .mtag{font-style:italic;opacity:.55;font-size:.61rem}
        .cpbtn{
            background:none;border:none;color:var(--muted);cursor:pointer;
            padding:2px 4px;border-radius:4px;transition:color .2s;
            opacity:0;
        }
        .cpbtn svg{width:11px;height:11px}
        .msg:hover .cpbtn{opacity:1}
        .cpbtn:hover{color:var(--accent)}

        /* markdown */
        .bbl strong{font-weight:600;color:var(--accent)}
        .msg.u .bbl strong{color:#fde68a}
        .bbl em{font-style:italic;opacity:.85}
        .bbl code{
            background:rgba(139,92,246,.15);color:#c4b5fd;
            padding:1px 6px;border-radius:5px;
            font-family:'Courier New',monospace;font-size:.82em;
        }
        body.light .msg.b .bbl code{background:rgba(109,40,217,.1);color:#6d28d9}
        .bbl pre{
            background:rgba(0,0,0,.28);border:1px solid var(--border);
            border-radius:10px;padding:12px;margin:8px 0;
            overflow-x:auto;font-family:'Courier New',monospace;font-size:.8em;
        }
        .bbl ul,.bbl ol{padding-left:18px;margin:5px 0}
        .bbl li{margin:3px 0}
        .bbl h1,.bbl h2,.bbl h3{
            font-family:'Syne',sans-serif;
            margin:8px 0 4px;color:var(--accent);
        }
        .bbl a{color:var(--accent)}

        /* typing */
        .typing{
            align-self:flex-start;
            padding:10px 14px;
            background:var(--bot-bg);
            border:1px solid var(--border);
            border-radius:16px;border-bottom-left-radius:4px;
            display:flex;align-items:center;gap:8px;
            animation:pop .25s ease;
        }
        .tlabel{font-size:.78rem;color:var(--muted)}
        .dots{display:flex;gap:4px}
        .dots span{
            width:6px;height:6px;border-radius:50%;
            background:var(--accent);
            animation:bonce 1.3s ease-in-out infinite;
        }
        .dots span:nth-child(2){animation-delay:.15s}
        .dots span:nth-child(3){animation-delay:.3s}
        @keyframes bonce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

        /* intro card */
        .intro{
            align-self:center;text-align:center;
            padding:16px 22px;
            background:var(--surface2);
            border:1px dashed var(--border);
            border-radius:18px;
            color:var(--muted);font-size:.82rem;line-height:1.6;
            cursor:pointer;transition:all .25s;max-width:88%;
        }
        .intro:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}

        /* error */
        .errmsg{
            padding:10px 14px;
            background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
            border-radius:10px;color:#fca5a5;font-size:.82rem;align-self:stretch;
        }

        /* INPUT */
        .input-wrap{
            padding:12px 16px 14px;
            border-top:1px solid var(--border);
            background:var(--surface2);flex-shrink:0;
        }
        .input-row{
            display:flex;align-items:center;gap:8px;
            background:var(--in-bg);
            border:1px solid var(--border);
            border-radius:13px;
            padding:7px 7px 7px 15px;
            transition:border-color .2s,box-shadow .2s;
        }
        .input-row:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
        #mi{
            flex:1;background:none;border:none;
            color:var(--text);font-family:'DM Sans',sans-serif;
            font-size:.9rem;outline:none;
        }
        #mi::placeholder{color:var(--muted)}
        #sb{
            width:34px;height:34px;border-radius:9px;
            background:linear-gradient(135deg,#7c3aed,#db2777);
            border:none;color:#fff;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            transition:all .2s;flex-shrink:0;
            box-shadow:0 4px 12px rgba(124,58,237,.4);
        }
        #sb svg{width:14px;height:14px}
        #sb:hover:not(:disabled){transform:scale(1.08);box-shadow:0 6px 18px rgba(124,58,237,.55)}
        #sb:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
        .hint{text-align:center;font-size:.62rem;color:var(--muted);margin-top:6px}

        /* minimize */
        .app.min{height:62px}
        .app.min .mbar,.app.min .msgs,.app.min .input-wrap{display:none}

        /* notif */
        .notif{
            position:fixed;top:16px;right:16px;
            padding:9px 15px;border-radius:10px;
            font-size:.78rem;z-index:999;
            display:flex;align-items:center;gap:6px;
            animation:nslide .3s ease,nfade .3s ease 2.7s forwards;
        }
        .notif.ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80}
        .notif.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171}
        @keyframes nslide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
        @keyframes nfade{from{opacity:1}to{opacity:0;pointer-events:none}}

        @media(max-width:680px){
            .app{height:100dvh;border-radius:0;max-width:100%}
            body{padding:0}
            .msg{max-width:90%}
            .nav-floating { top: 12px; left: 12px; }
        }
    </style>
</head>
<body>

<div class="nav-floating">
    <a href="index.html" class="nav-back-btn">🏠 Home</a>
    <a href="dashboard.html" class="nav-back-btn">📊 Dashboard</a>
</div>

<div class="app" id="app">

    <div class="hdr">
        <div class="hdr-l">
            <div class="logo">
                <svg viewBox="0 0 24 24"><path d="M20 9V7a2 2 0 0 0-2-2h-1V4a1 1 0 0 0-2 0v1H9V4a1 1 0 0 0-2 0v1H6a2 2 0 0 0-2 2v2a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2zm0 8H4v-6h16v6zM8 14a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm4 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm4 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>
            </div>
            <div>
                <div class="app-name">A Day Companion</div>
                <div class="app-sub"><span class="live-dot"></span>Online &amp; ready</div>
            </div>
        </div>
        <div class="hdr-r">
            <div class="status-pill" id="spill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                Ready
            </div>
            
            <button class="ibtn" id="themeBtn" title="Toggle theme">
                <svg id="themeIco" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="ibtn" id="clearBtn" title="Clear chat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
            <button class="ibtn" id="minBtn" title="Minimize">
                <svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="11" width="16" height="2" rx="1"/></svg>
            </button>
            <button class="ibtn" id="closeBtn" title="Return to Dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
    </div>
    <div class="mbar">
        <span class="mbar-label">Model</span>
        <select id="modelSelect" class="msel">
            <option value="openai/gpt-3.5-turbo">GPT-3.5 Turbo</option>
            <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
            <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B</option>
        </select>
    </div>
    <div class="msgs" id="msgs">
        <div class="msg b">
            <div class="bbl">Hey! 👋 I'm <strong>A Day Companion</strong> — your personal AI assistant. Ask me anything about coding, writing, research, or whatever's on your mind.</div>
            <div class="meta">
                <span id="initTime"></span>
            </div>
        </div>
        <div class="intro" id="introCard">✨ Tap for a random starter question</div>
    </div>
    <div class="input-wrap">
        <div class="input-row">
            <input type="text" id="mi" placeholder="Ask me anything…" autocomplete="off">
            <button id="sb">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
            </button>
        </div>
        <div class="hint">Press Enter to send</div>
    </div>
</div>

<script>
    const BACKEND_API_URL = "/api/chat"; 

    const app        = document.getElementById('app');
    const msgsEl     = document.getElementById('msgs');
    const mi         = document.getElementById('mi');
    const sb         = document.getElementById('sb');
    const msel       = document.getElementById('modelSelect');
    const spill      = document.getElementById('spill');
    const themeBtn   = document.getElementById('themeBtn');
    const themeIco   = document.getElementById('themeIco');
    const clearBtn   = document.getElementById('clearBtn');
    const minBtn     = document.getElementById('minBtn');
    const closeBtn   = document.getElementById('closeBtn');
    const introCard  = document.getElementById('introCard');
    document.getElementById('initTime').textContent = nowStr();

    let isThinking = false;
    let convo = [{
        role:"system",
        content:`You are A DAY COMPANION, a helpful and friendly AI assistant. You can speak English and Hindi. You're skilled at technology, programming, and general knowledge. Be concise, warm, and helpful. Use markdown formatting when appropriate. Keep responses under 300 words unless the user asks for more. Use emojis occasionally. If asked about yourself, say you're A DAY COMPANION.`
    }];

    // ── HELPERS ──
    function nowStr(){ return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

    function save(){
        try{
            localStorage.setItem('adc_model', msel.value);
            localStorage.setItem('adc_theme', document.body.classList.contains('light')?'light':'dark');
            localStorage.setItem('adc_history', JSON.stringify(convo));
        }catch(e){}
    }

    function load(){
        try{
            const m = localStorage.getItem('adc_model');
            if(m) msel.value = m;
            if(localStorage.getItem('adc_theme')==='light') applyTheme(true);
            const h = localStorage.getItem('adc_history');
            if(h){
                const hist = JSON.parse(h);
                if(Array.isArray(hist) && hist.length>1){
                    for(let i=1;i<hist.length;i++){
                        renderMsg(hist[i].content, hist[i].role==='user', null, false, false);
                        convo.push(hist[i]);
                    }
                }
            }
        }catch(e){}
    }

    function applyTheme(light){
        document.body.classList.toggle('light', light);
        if(light){
            themeIco.setAttribute('fill','none');
            themeIco.setAttribute('stroke','currentColor');
            themeIco.setAttribute('stroke-width','2');
            themeIco.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
        } else {
            themeIco.setAttribute('fill','currentColor');
            themeIco.removeAttribute('stroke');
            themeIco.removeAttribute('stroke-width');
            themeIco.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
        }
    }

    function setPill(text, state='ok'){
        spill.className = `status-pill ${state==='warn'?'warn':state==='idle'?'idle':''}`;
        const icons = {
            ok:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="9" height="9"><polyline points="20 6 9 17 4 12"/></svg>`,
            warn: `<svg viewBox="0 0 24 24" fill="currentColor" width="9" height="9"><path d="M12 2L2 22h20L12 2zm1 15h-2v-2h2v2zm0-4h-2V9h2v4z"/></svg>`,
            idle: `<svg viewBox="0 0 24 24" fill="currentColor" width="9" height="9"><circle cx="12" cy="12" r="3"/></svg>`
        };
        spill.innerHTML = (icons[state]||icons.ok) + ' ' + text;
    }

    function notify(msg, isErr=false){
        document.querySelectorAll('.notif').forEach(n=>n.remove());
        const n = document.createElement('div');
        n.className = `notif ${isErr?'err':'ok'}`;
        n.textContent = msg;
        document.body.appendChild(n);
        setTimeout(()=>n.remove(), 3300);
    }

    function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

    function fmt(text){
        if(!text) return '';
        let f = text;
        f = f.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_,lang,code) => `<pre><code>${esc(code.trim())}</code></pre>`);
        f = f
            .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
            .replace(/\*(.*?)\*/g,'<em>$1</em>')
            .replace(/`([^`]+)`/g,'<code>$1</code>')
            .replace(/^### (.*$)/gm,'<h3>$1</h3>')
            .replace(/^## (.*$)/gm,'<h2>$1</h2>')
            .replace(/^# (.*$)/gm,'<h1>$1</h1>')
            .replace(/^\s*[-*] (.*$)/gm,'<li>$1</li>')
            .replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
            .replace(/\n/g,'<br>');
        f = f.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
        return f;
    }

    const COPY_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    const CHECK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg>`;

    function renderMsg(text, isUser, modelName=null, saveHist=true, animate=true){
        const ic = document.getElementById('introCard');
        if(ic){ ic.style.transition='opacity .2s'; ic.style.opacity='0'; setTimeout(()=>{try{ic.remove()}catch(e){}},220); }

        const wrap = document.createElement('div');
        wrap.className = `msg ${isUser?'u':'b'}`;
        if(!animate) wrap.style.animation='none';

        const bbl = document.createElement('div');
        bbl.className = 'bbl';
        bbl.innerHTML = fmt(text);

        const meta = document.createElement('div');
        meta.className = 'meta';

        if(modelName && !isUser){
            const ms = document.createElement('span');
            ms.className = 'mtag';
            ms.textContent = modelName;
            meta.appendChild(ms);
        }
        const ts = document.createElement('span');
        ts.textContent = nowStr();
        meta.appendChild(ts);

        const cp = document.createElement('button');
        cp.className = 'cpbtn';
        cp.title = 'Copy';
        cp.innerHTML = COPY_SVG;
        cp.onclick = ()=>{
            navigator.clipboard.writeText(text).then(()=>{
                cp.innerHTML = CHECK_SVG;
                setTimeout(()=>{ cp.innerHTML = COPY_SVG; }, 2000);
            });
        };
        meta.appendChild(cp);

        wrap.appendChild(bbl);
        wrap.appendChild(meta);
        msgsEl.appendChild(wrap);
        msgsEl.scrollTop = msgsEl.scrollHeight;

        if(saveHist){
            convo.push({ role: isUser?'user':'assistant', content: text });
            if(convo.length > 21) convo = [convo[0], ...convo.slice(-20)];
            setTimeout(save, 100);
        }
    }

    function addErr(text) {
        const d = document.createElement('div');
        d.className = 'errmsg';
        d.textContent = '⚠ ' + text;
        msgsEl.appendChild(d);
        msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    function showTyping() {
        const d = document.createElement('div');
        d.className='typing'; d.id='typing';
        d.innerHTML=`<span class="tlabel">Thinking</span><div class="dots"><span></span><span></span><span></span></div>`;
        msgsEl.appendChild(d);
        msgsEl.scrollTop = msgsEl.scrollHeight;
    }
    function hideTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }

    async function getAIResponse(userInput){
        const selectedModel = msel.value;
        const modelName = msel.options[msel.selectedIndex].text;

        showTyping();
        setPill('Processing…','idle');
        try{
            const controller = new AbortController();
            const tid = setTimeout(()=>controller.abort(), 45000);
            
            // Calling our own Vercel Backend securely!
            const response = await fetch(BACKEND_API_URL,{
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: selectedModel,
                    messages: convo
                }),
                signal: controller.signal
            });
            
            clearTimeout(tid);
            
            if(!response.ok){
                let et="Unknown error";
                try{ const ed=await response.json(); et=ed.error?.message || ed.error || JSON.stringify(ed); }
                catch(e){ et=await response.text(); }
                throw new Error(`API Error (${response.status}): ${et}`);
            }
            
            const data = await response.json();
            hideTyping();
            setPill('Ready','ok');
            
            if(data.choices && data.choices.length>0 && data.choices[0].message){
                const aiResponse = data.choices[0].message.content;
                return { response:aiResponse, modelName, isError:false };
            } else {
                return { response:"I received an empty response. Please try again.", modelName, isError:true };
            }
        }catch(error){
            hideTyping();
            let em="";
            if(error.name==='AbortError')                                          { setPill('Timeout','warn');     em="Request timed out (45s). Try a simpler query or different model."; }
            else if(error.message.includes("401")||error.message.includes("403")) { setPill('Invalid Key','warn'); em="Backend authorization failed. Check your Vercel Environment Variables."; }
            else if(error.message.includes("429"))                                 { setPill('Rate Limited','warn');em="Rate limit exceeded. Please wait a moment and try again."; }
            else if(error.message.includes("network")||error.message.includes("fetch")){ setPill('Network Err','warn'); em="Network error. Please check your internet connection."; }
            else if(error.message.includes("402")||error.message.includes("credit")){ setPill('No Credits','warn'); em="Insufficient credits. Please add credits to your OpenRouter account."; }
            else                                                                    { setPill('Error','warn');       em=`Error: ${error.message}.`; }
            console.error("Backend API Error:", error);
            return { response:em, modelName, isError:true };
        }
    }

    async function sendMessage() {
        const text = mi.value.trim();
        if(!text || isThinking) return;
        isThinking = true;
        sb.disabled = true;
        renderMsg(text, true);
        mi.value = '';
        const result = await getAIResponse(text);
        if(result.isError) addErr(result.response);
        else renderMsg(result.response, false, result.modelName);
        isThinking = false;
        sb.disabled = false;
        mi.focus();
    }

    sb.onclick = sendMessage;
    mi.addEventListener('keypress', e=>{ if(e.key==='Enter' && !sb.disabled) sendMessage(); });
    msel.onchange = save;

    themeBtn.onclick = ()=>{
        const goLight = !document.body.classList.contains('light');
        applyTheme(goLight);
        save();
    };

    clearBtn.onclick = ()=>{
        if(!confirm("Clear all messages?")) return;
        msgsEl.innerHTML = '';
        convo = [convo[0]];
        renderMsg("Chat cleared! What would you like to talk about? 🚀", false, null, false);
        save();
    };

    minBtn.onclick = ()=>{
        app.classList.toggle('min');
        const isMin = app.classList.contains('min');
        minBtn.querySelector('svg').innerHTML = isMin
            ? '<path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>'
            : '<rect x="4" y="11" width="16" height="2" rx="1"/>';
    };

    // REDIRECTS TO DASHBOARD
    closeBtn.onclick = ()=>{
        window.location.href = 'dashboard.html';
    };

    const starters = [
        "How does machine learning work?",
        "Write a short poem about technology",
        "Help me debug my JavaScript code",
        "Explain quantum computing simply",
        "Best practices for REST API design?",
        "Explain async/await in JavaScript",
        "What's the difference between TCP and UDP?"
    ];
    introCard.onclick = ()=>{
        mi.value = starters[Math.floor(Math.random()*starters.length)];
        mi.focus();
    };

    // wire up initial copy button
    document.querySelector('.cpbtn').onclick = ()=>{
        const text = document.querySelector('.bbl').textContent;
        navigator.clipboard.writeText(text);
    };

    window.addEventListener('load', ()=>{ load(); mi.focus(); });
    window.addEventListener('beforeunload', save);
</script>
</body>
</html>
